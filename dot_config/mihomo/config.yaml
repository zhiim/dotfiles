    filter: *FilterJP
    exclude-filter: *Exclude
    include-all-providers: true
  - name: рҹҮ°рҹҮ· йҹ©еӣҪ
    type: select
    filter: *FilterKR
    exclude-filter: *Exclude
    include-all-providers: true
  - name: рҹҮёрҹҮ¬ ж–°еҠ еқЎ
    type: select
    filter: *FilterSG
    exclude-filter: *Exclude
    include-all-providers: true
  - name: рҹҮәрҹҮё зҫҺеӣҪ
    type: select
    filter: *FilterUS
    exclude-filter: *Exclude
    include-all-providers: true
  - name: рҹҢҸ е…¶е®ғең°еҢә
    type: select
    filter: *FilterOT
    exclude-filter: *Exclude
    include-all-providers: true

  - name: рҹҚ® Github
    <<: *default
  - name: рҹҘӣ Spotify
    <<: *default
  - name: рҹ«ҷ Microsoft
    <<: *default
  - name: рҹ§Ҡ Google
    <<: *default
  - name: рҹҚӯ Telegram
    <<: *default
  - name: рҹ§Ӣ YouTube
    <<: *default
  - name: рҹҚЎ Tracker
