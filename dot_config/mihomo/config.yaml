# +----------------------------------------------------------+
# |                         д»ЈзҗҶй…ҚзҪ®                         |
# +----------------------------------------------------------+

# еҸҜд»Ҙж·»еҠ еҚ•дёӘд»ЈзҗҶжңҚеҠЎеҷЁ
proxies:
  - name: "рҹҺҜ зӣҙиҝһ"
    type: direct
    udp: true

# provider й”ҡзӮ№
p: &p
  type: http
  interval: 86400
  health-check:
    enable: true
    url: https://www.google.com/generate_204
    interval: 21600

# url йҮҢеЎ«еҶҷиҮӘе·ұзҡ„и®ўйҳ…,еҗҚз§°дёҚиғҪйҮҚеӨҚ
proxy-providers:
  main:
    <<: *p
    url: ""
  fallback1:
    <<: *p
    url: ""
    override:
      additional-prefix: "[еӨҮ]"
  fallback2:
    <<: *p
    url: ""
    override:
      additional-prefix: "[иҮӘ]"

# +----------------------------------------------------------+
# |                      Clash еҹәзЎҖи®ҫзҪ®                      |
# +----------------------------------------------------------+

allow-lan: true
mode: rule
log-level: info
ipv6: true
find-process-mode: strict
external-controller: 127.0.0.1:9090
external-ui: ui # еүҚз«Ҝи·Ҝеҫ„ /path/to/clash/config/ui
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist-firasans-only.zip"
unified-delay: true # и®Ўз®—е»¶иҝҹж—¶жҳҜеҗҰеҺ»йҷӨжҸЎжүӢзӯүйўқеӨ–ејҖй”Җ
profile: # зј“еӯҳй…ҚзҪ®
  store-selected: true # дҝқеӯҳ API жҺ§еҲ¶зҡ„жӣҙж”№
  store-fake-ip: true # дҝқеӯҳ fake-ip жҳ е°„иЎЁ
tcp-concurrent: true
geodata-mode: true # geo й…ҚзҪ®
geo-auto-update: true
geo-update-interval: 24
geox-url: # иҮӘе®ҡд№үGEOдёӢиҪҪең°еқҖ, еҗҜз”ЁcdnеҠ йҖҹдёӢиҪҪ
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"

# +----------------------------------------------------------+
# |                         DNS и®ҫзҪ®                         |
# +----------------------------------------------------------+

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true # еҰӮжһңйңҖиҰҒдҪҝз”Ё box for magisk зҡ„зғӯзӮ№е…ұдә«д»ЈзҗҶпјҢйңҖиҰҒи®ҫзҪ®дёә false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16 # clash д»ҘжӯӨ IP ж®өеҸ‘йҖҒ fake-ip жҳ е°„
  fake-ip-range6: fdfe:dcba:9876::1/64
  fake-ip-filter: # fakeip еҲҶжөҒпјҢи®©еӣҪеҶ…еҹҹеҗҚиө° real-ipпјҢе…¶дҪҷиө° fake-ip
    - RULE-SET,private_domain,real-ip
    - RULE-SET,fakeip_filter,real-ip
    - RULE-SET,qiufen_ad_doamin,real-ip # дј йҖ’з»ҷ real-ip е®һзҺ°дёҚи§Јжһҗ
    - RULE-SET,category_ads_domain,real-ip
    - RULE-SET,category_porn_domain,real-ip
    - RULE-SET,blacklist,real-ip
    - RULE-SET,google_domain,fake-ip
    - RULE-SET,microsoft_domain,fake-ip
    - RULE-SET,geolocation-!cn,fake-ip
    - RULE-SET,cn_domain,real-ip
    - MATCH,fake-ip
  fake-ip-filter-mode: rule
  default-nameserver: # з”ЁдәҺи§Јжһҗ DNS жңҚеҠЎеҷЁ, еҝ…йЎ»дёә IP дё”еҸҜи®ҝй—®
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy: # real-ip зҡ„еҲҶжөҒи§„еҲҷпјҢеӣҪеҶ…еӨ–еҹҹеҗҚеҲҶжөҒ
    "sub.skky.indevs.in": # еӣҪеҶ…еҸҜи®ҝй—®зҡ„еўғеӨ– dns и§Јжһҗи®ўйҳ…й“ҫжҺҘ
      - 8.8.8.8
    "+.cloudflare-ech.com":
      - https://dns.alidns.com/dns-query
    "rule-set:blacklist,qiufen_ad_doamin":
      - rcode://success # йҖҡиҝҮдёҚи§Јжһҗ dns жӢҰжҲӘ
    "geosite:category-ads-all,category-porn":
      - rcode://success
    "rule-set:private_domain,fakeip_filter":
      - https://dns.alidns.com/dns-query
    "rule-set:google_domain,microsoft_domain,geolocation-!cn":
      - https://8.8.8.8/dns-query#рҹҘӨ й»ҳи®Ө
    "geosite:cn":
      - https://dns.alidns.com/dns-query
  proxy-server-nameserver: # з”ЁдәҺи§Јжһҗд»ЈзҗҶиҠӮзӮ№зҡ„еҹҹеҗҚ
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver: # й»ҳи®ӨеҹҹеҗҚи§ЈжһҗпјҢз”ЁдәҺе…ңеә• nameserver-policy ж— жі•еҢ№й…Қзҡ„еҹҹеҗҚ
    - https://8.8.8.8/dns-query#рҹҘӨ й»ҳи®Ө&ecs=114.114.114.114/24&ecs-override=true

# +----------------------------------------------------------+
# |       еҹҹеҗҚе—…жҺўпјҢд»ҺжөҒйҮҸдёӯиҺ·еҸ–еҹҹеҗҚпјҢд»ҺиҖҢдҪҝз”ЁеҹҹеҗҚи§„еҲҷ       |
# +----------------------------------------------------------+

sniffer:
  enable: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"

