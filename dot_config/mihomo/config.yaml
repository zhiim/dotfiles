    - рҹҡҖ е…ЁйғЁиҠӮзӮ№
    - вҷ» иҮӘеҠЁйҖүжӢ©

proxy-groups:
  - name: рҹҘӨ й»ҳи®Ө
    type: select
    proxies:
      - рҹҡҖ е…ЁйғЁиҠӮзӮ№
      - вҷ» иҮӘеҠЁйҖүжӢ©
      - рҹҺҜ зӣҙиҝһ
      - рҹҮӯрҹҮ° йҰҷжёҜ
      - рҹҮ№рҹҮј еҸ°ж№ҫ
      - рҹҮҜрҹҮө ж—Ҙжң¬
      - рҹҮ°рҹҮ· йҹ©еӣҪ
      - рҹҮёрҹҮ¬ ж–°еҠ еқЎ
      - рҹҮәрҹҮё зҫҺеӣҪ
      - рҹҢҸ е…¶е®ғең°еҢә

  - name: рҹҡҖ е…ЁйғЁиҠӮзӮ№
    type: select
    proxies:
      - вңҲпёҸ дё»и®ўйҳ…
      - рҹӣ©пёҸ еӨҮз”Ёи®ўйҳ…
      - рҹӣ©пёҸ иҮӘе»әиҠӮзӮ№
  - name: вңҲпёҸ дё»и®ўйҳ…
    type: select
    exclude-filter: *Exclude
    include-all-providers: true
  - name: рҹӣ©пёҸ еӨҮз”Ёи®ўйҳ…
    type: select
    filter: '^\[еӨҮ\].*$'
    include-all-providers: true
  - name: рҹӣ©пёҸ иҮӘе»әиҠӮзӮ№
    type: select
    filter: '^\[иҮӘ\].*$'
    include-all: true

  - name: вҷ» иҮӘеҠЁйҖүжӢ©
    type: url-test
    interval: 21600
    lazy: true
    url: "https://www.google.com/generate_204"
    hidden: true
    exclude-filter: *Exclude
    include-all-providers: true
