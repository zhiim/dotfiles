direct: &direct
  type: select
  proxies:
    - рҹҺҜ зӣҙиҝһ
    - рҹҘӨ й»ҳи®Ө
    - рҹҮӯрҹҮ° йҰҷжёҜ
    - рҹҮ№рҹҮј еҸ°ж№ҫ
    - рҹҮҜрҹҮө ж—Ҙжң¬
    - рҹҮ°рҹҮ· йҹ©еӣҪ
