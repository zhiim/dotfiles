FilterTW: &FilterTW "^(?=.*(?i)(еҸ°|рҹҮјрҹҮё|рҹҮ№рҹҮј|TW|tai|TPE|TSA|KHH)).*$"
FilterOT: &FilterOT "^(?!.*(жёҜ|рҹҮӯрҹҮ°|HK|Hong|HKG|еқЎ|рҹҮёрҹҮ¬|SG|Sing|SIN|XSP|ж—Ҙ|рҹҮҜрҹҮө|JP|Japan|NRT|HND|KIX|CTS|FUK|йҹ©|рҹҮ°рҹҮ·|йҹ“|йҰ–е°”|еҚ—жңқйІң|KR|KOR|Korea|South|зҫҺ|рҹҮәрҹҮё|US|USA|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD|еҸ°|рҹҮјрҹҮё|рҹҮ№рҹҮј|TW|tai|TPE|TSA|KHH)).*$"

Exclude: &Exclude '^(\[еӨҮ\]|\[иҮӘ\]).*$'

default: &default
  type: select
  proxies:
    - рҹҘӨ й»ҳи®Ө
    - рҹҮӯрҹҮ° йҰҷжёҜ
    - рҹҮ№рҹҮј еҸ°ж№ҫ
    - рҹҮҜрҹҮө ж—Ҙжң¬
    - рҹҮ°рҹҮ· йҹ©еӣҪ
