source = colors.conf

$mpris_script = ~/.config/hypr/scripts/mpris_info.sh
$mpris_cache_path = ~/.cache/hyprlock_media

# General
general {
    no_fade_in = false
    hide_cursor = false
    grace = 0
    disable_loading_bar = false
}

# Background
background {
    monitor =
    path = $image
    blur_passes = 2
    contrast = 1
    brightness = 0.89
    vibrancy = 0.1
    vibrancy_darkness = 0.1
}


# Time
label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%-H:%M")"
  color = $primary
  font_size = 320
  font_family = JetBrainsMono Nerd Font Propo ExtraBold
  position = 0, -180
  halign = center
  valign = top
}

# Date
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = $on_surface
  font_size = 64
  font_family = JetBrainsMono Nerd Font Propo Bold
  position = 0, -700
  halign = center
  valign = top
}

# Profie-Photo
image {
    monitor =
    path = /var/lib/AccountsService/icons/$USER
    border_size = 2
    border_color = $primary
    size = 130
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, -120
    halign = center
    valign = center
}

# Greeting
label {
    monitor =
    text = Hello, $USER
    color = $on_surface
    font_size = 48
    font_family = JetBrainsMono Nerd Font Propo Bold
    position = 0, -240
    halign = center
    valign = center
}

# Input field
input-field {
    monitor =
    size = 600, 100
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.35 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = $outline
    inner_color = $surface_container
    font_color = $on_surface
    fade_on_empty = false
    rounding = -1
    check_color = $primary
    placeholder_text = <i><span>Input Password...</span></i>
    hide_input = false
    position = 0, -390
    halign = center
    valign = center
}

# Music blur div
shape {
    monitor =
    size = 700, 180
    color = $surface_container_highest
    rounding = 30
    rotate = 0
    position = 0, 50
    halign = center
    valign = bottom
    zindex = 1
}

# Music Album Art
image {
    monitor =
    path = $mpris_cache_path/album_art.png
    size = 140
    rounding = 10
    rotate = 0
    border_size = 0
    reload_time = 1
    reload_cmd = $mpris_script --album
    position = -255, 70
    halign = center
    valign = bottom
    zindex = 5
}

# Player Source
label {
    monitor =
    text = cmd[update:1000] echo "$($mpris_script --source)"
    color = $on_surface_variant
    font_size = 18
    font_family = JetBrainsMono Nerd Font Propo
    position = 1380, 175
    halign = left
    valign = bottom
    zindex = 5
}

# Player title
label {
    monitor =
    text = cmd[update:1000] cat $mpris_cache_path/title
    color = $on_surface
    font_size = 22
    font_family = JetBrainsMono Nerd Font Propo Bold
    position = 1380, 105
    halign = left
    valign = bottom
    zindex = 5
}

# Player artist
label {
    monitor =
    text = cmd[update:1000] cat $mpris_cache_path/artist
    color = $on_surface
    font_size = 18
    font_family = JetBrainsMono Nerd Font Propo
    position = 1380, 65
    halign = left
    valign = bottom
    zindex = 5
}

# Player status
label {
    monitor =
    text = cmd[update:1000] echo "$($mpris_script --status)"
    color = $on_surface
    font_size = 20
    font_family = JetBrainsMono Nerd Font Propo
    position = -1215, 100
    halign = right
    valign = bottom
    zindex = 5
}

# Player length
label {
    monitor =
    text = cmd[update:1000] cat $mpris_cache_path/length
    color = $on_surface
    font_size = 18
    font_family = JetBrainsMono Nerd Font Propo
    position = -1210, 60
    halign = right
    valign = bottom
    zindex = 5
}
